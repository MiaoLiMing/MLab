name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mlab
          POSTGRES_USER: mlab
          POSTGRES_PASSWORD: mlab
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mlab -d mlab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: development
      APP_SECRET_KEY: ci-secret-key-with-at-least-32-characters
      DATABASE_URL: postgresql+asyncpg://mlab:mlab@localhost:5432/mlab
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e "./backend[dev]"
      - run: python -m ruff format --check backend/app backend/tests backend/alembic/versions
      - run: python -m ruff check backend/app backend/tests backend/alembic/versions
      - run: cd backend && alembic upgrade head && alembic check
      - run: python -m pytest backend/tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm --dir frontend install --no-frozen-lockfile
      - run: pnpm --dir frontend lint
      - run: pnpm --dir frontend test
      - run: pnpm --dir frontend build
