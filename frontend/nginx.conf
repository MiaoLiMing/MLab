server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://api:8000;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 180s;
  }

  location /health/ {
    proxy_pass http://api:8000;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

